    <title>Achievements</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffe4e1; 
            color: #333; 
            text-align: center;
        }

        /* Header Styles */
        h1 {
            font-size: 2.5em;
            color: #b22222; 
            background-color: #ffc0cb; 
            padding: 20px;
            margin: 0;
            border-bottom: 2px solid #b22222;
        }

        /* Image Styling */
        img {
            margin: 20px;
            max-width: 90%; 
            height: auto; 
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        img:hover {
            transform: scale(1.05); /* Slight zoom on hover */
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.3);
        }

        /* Footer Styles */
        footer {
            margin-top: 30px;
            padding: 10px;
            background-color: #b22222; 
            color: white;
            font-size: 1em;
        }
         /* Navigation Buttons */
         nav {
            margin: 20px auto;
            text-align: center;
        }

        nav button {
            background-color: #6a0dad;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        nav button a {
            color: white;
            text-decoration: none;
        }

        nav button:hover {
            background-color: #5a009d;
        }
    </style>
</head>
